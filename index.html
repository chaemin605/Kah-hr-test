<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KAH HR 포지션 진단 테스트</title>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

        :root {
            --primary-color: #5C6AC4;
            --secondary-color: #8A98F3;
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            --card-bg: rgba(255, 255, 255, 0.98);
            --text-main: #2D3748;
            --text-muted: #718096;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 15px;
            box-sizing: border-box;
        }

        .container {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 500px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.08);
            padding: 35px 25px;
            text-align: center;
            position: relative;
            animation: slideUp 0.4s ease-out forwards;
            box-sizing: border-box;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fade-in { animation: fadeIn 0.4s ease-in forwards; }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 12px;
            color: var(--primary-color);
            font-weight: 800;
            word-break: keep-all;
        }

        p {
            font-size: 1rem;
            line-height: 1.5;
            color: var(--text-muted);
            margin-bottom: 25px;
            word-break: keep-all;
        }

        .btn {
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 16px 20px;
            font-size: 1.05rem;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 12px rgba(92, 106, 196, 0.25);
            margin-bottom: 10px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(92, 106, 196, 0.35);
        }

        .option-btn {
            background: #F7FAFC;
            color: var(--text-main);
            border: 2px solid #EDF2F7;
            font-weight: 500;
            text-align: left;
            line-height: 1.4;
            font-size: 0.95rem;
            padding: 16px;
            margin-bottom: 10px;
            box-shadow: none;
            word-break: keep-all;
        }

        .option-btn:active {
            background: #EBF4FF;
            border-color: #BEE3F8;
            transform: scale(0.98);
        }

        #question-screen, #result-screen, #loading-screen { display: none; }

        .header-wrapper {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .back-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 0.9rem;
            cursor: pointer;
            padding: 5px 0;
            font-weight: 600;
        }

        .progress-text {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: bold;
        }

        .progress-bar {
            width: 100%;
            background-color: #EDF2F7;
            height: 8px;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 25px;
        }

        .progress-fill {
            height: 100%;
            background-color: var(--primary-color);
            width: 0%;
            transition: width 0.3s ease;
        }

        .question-text {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 25px;
            word-break: keep-all;
            line-height: 1.4;
        }

        .result-subtitle { font-size: 0.95rem; color: var(--text-muted); margin-bottom: 5px; }
        .result-title { font-size: 1.8rem; font-weight: 800; color: var(--primary-color); margin: 5px 0 20px 0; }
        
        .result-card {
            background-color: #F7FAFC;
            border: 1px solid #E2E8F0;
            padding: 20px 15px;
            border-radius: 14px;
            font-size: 0.95rem;
            text-align: center;
            margin-bottom: 20px;
            line-height: 1.6;
            word-break: keep-all;
        }

        .action-plan {
            text-align: left;
            background: #EBF4FF;
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            color: #2B6CB0;
            line-height: 1.5;
            word-break: keep-all;
        }
        .action-plan strong { display: block; margin-bottom: 8px; color: var(--primary-color); font-size: 0.95rem;}

        .stat-container {
            text-align: left;
            background: white;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #E2E8F0;
            margin-bottom: 20px;
        }
        .stat-title { font-size: 0.95rem; font-weight: bold; margin-bottom: 12px; text-align: center; color: var(--primary-color); }
        .stat-item { margin-bottom: 10px; font-size: 0.85rem; }
        .stat-bar-bg { background: #EDF2F7; height: 6px; border-radius: 3px; margin-top: 4px; overflow: hidden; }
        .stat-bar-fill { background: var(--secondary-color); height: 100%; border-radius: 3px; }

        /* 케미스트리(짝꿍) 섹션 스타일 수정 */
        .chemistry-section {
            background-color: #fcfcfc;
            border: 1px dashed #CBD5E0;
            padding: 20px 15px;
            border-radius: 16px;
            margin-bottom: 25px;
        }

        .chemistry-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .chem-box {
            padding: 16px;
            border-radius: 12px;
            text-align: left;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .chem-good { background: #E6FFFA; color: #285E61; border: 1px solid #B2F5EA; }
        .chem-bad { background: #FFF5F5; color: #742A2A; border: 1px solid #FED7D7; }
        
        .chem-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 800;
        }
        
        .chem-title { font-size: 0.8rem; opacity: 0.9; }
        .chem-name { font-size: 1.1rem; }
        .chem-reason { font-size: 0.85rem; line-height: 1.4; opacity: 0.9; word-break: keep-all; margin-top: 4px; }

        .capture-tip {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 15px;
            font-weight: 500;
        }

        .spinner {
            width: 40px; height: 40px;
            border: 4px solid #EDF2F7; border-top: 4px solid var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* 눈에 보이지 않게 출처 숨김 처리 */
        .hidden-cite { display: none; }

        @media (max-width: 480px) {
            .container { padding: 30px 20px; }
            h1 { font-size: 1.35rem; }
            .question-text { font-size: 1.1rem; }
            .option-btn { font-size: 0.9rem; padding: 14px; }
            .result-title { font-size: 1.6rem; }
            .chem-name { font-size: 1rem; }
            .chem-reason { font-size: 0.8rem; }
        }
    </style>
</head>
<body>

<!-- 시작 화면 -->
<div class="container" id="start-screen">
    <h1>KAH HR 포지션 진단</h1>
    <p>나의 성향에 가장 잘 맞는 HR 세부 직무는 무엇일까요?<br>12개의 질문을 통해 나의 진짜 포지션을 찾아보세요!</p>
    <button class="btn" onclick="startTest()">테스트 시작하기 🚀</button>
</div>

<!-- 질문 화면 -->
<div class="container" id="question-screen">
    <div class="header-wrapper">
        <button class="back-btn" onclick="goBack()">◀ 이전</button>
        <div class="progress-text" id="progress-text">1 / 12</div>
    </div>
    <div class="progress-bar">
        <div class="progress-fill" id="progress"></div>
    </div>
    <div class="question-text fade-in" id="question-text">질문</div>
    <div id="options-container" class="fade-in"></div>
</div>

<!-- 로딩 화면 -->
<div class="container" id="loading-screen">
    <div class="spinner"></div>
    <h2 style="color: var(--primary-color); font-size:1.2rem;">HR DNA 분석 중...</h2>
    <p style="font-size:0.9rem;">나와 가장 잘 맞는 직무를 찾고 있습니다.</p>
</div>

<!-- 결과 화면 -->
<div class="container" id="result-screen">
    <div class="result-subtitle">나의 KAH HR 포지션은?</div>
    <div class="result-title fade-in" id="result-title">결과</div>
    
    <!-- 1. 메인 설명 -->
    <div class="result-card fade-in" id="result-desc">설명</div>

    <!-- 2. 커리어 액션 플랜 -->
    <div class="action-plan fade-in" id="action-plan"></div>

    <!-- 3. 스탯 막대그래프 -->
    <div class="stat-container fade-in">
        <div class="stat-title">📊 나의 직무 핏(Fit) 스탯</div>
        <div id="stats-container"></div>
    </div>

    <!-- 4. 환상의 짝꿍 (가장 아래로 이동) -->
    <div class="chemistry-section fade-in" id="chemistry-section">
        <div class="stat-title" style="margin-bottom: 15px;">👀 재미로 보는 직무 케미</div>
        <div class="chemistry-container" id="chemistry-container"></div>
    </div>

    <button class="btn" onclick="location.reload()">테스트 다시하기 🔄</button>
    <div class="capture-tip">📸 화면을 캡처해서 KAH 조원들과 공유해 보세요!</div>
</div>

<script>
    const questions = [
        { q: "Q1. 당신이 업무를 할 때 가장 스트레스를 받거나 피하고 싶은 상황은?", options: [ { text: "숫자가 1원이라도 틀리거나 계산/데이터 오류가 생기는 상황", type: "Comp" }, { text: "갈등이나 불만이 쌓여 전반적인 직원 경험(EX)이 훼손되는 상황", type: "OD" }, { text: "비즈니스 방향성과 HR 제도가 엇박자를 내어 성장을 저해하는 상황", type: "HRBP" } ] },
        { q: "Q2. 사내에 새로운 인사 제도를 도입해야 합니다. 당신의 접근 방식은?", options: [ { text: "노동부 지침, 취업규칙 등과의 정합성을 검토하고 요건을 준수한다.", type: "ER_LR" }, { text: "학습 동기부여 이론을 바탕으로 자율적인 학습 환경을 설계한다.", type: "HRD" }, { text: "조직에 필요한 우수 인재를 적극적으로 소싱하고 어필하는 전략을 짠다.", type: "TA" } ] },
        { q: "Q3. 사람을 평가하거나 관찰할 때, 당신의 시선이 가장 먼저 머무는 곳은?", options: [ { text: "조직에 필요한 역량을 갖춘 인재인지 발굴하려는 소싱 관점", type: "TA" }, { text: "어떤 지식을 필요로 하고 어떻게 역량을 고도화할지 살피는 육성 관점", type: "HRD" }, { text: "성과와 직급에 맞춰 보상이 공정하고 정확하게 배분되었는지 살피는 분석 관점", type: "Comp" } ] },
        { q: "Q4. 다수의 이해관계자와 소통할 때, 당신이 가장 자신 있는 역할은?", options: [ { text: "지원자와 현업 부서 사이에서 일정을 조율하고 무결점으로 운영하는 역할", type: "TA" }, { text: "노사관계나 갈등 상황에서 동향을 파악하고 협의 및 타협안을 도출하는 역할", type: "ER_LR" }, { text: "임직원들이 자율적으로 스터디하고 정보를 공유하도록 판을 깔아주는 역할", type: "HRD" } ] },
        { q: "Q5. 당장 내일 경영진에게 기획안을 제안해야 한다면, 가장 흥미로운 주제는?", options: [ { text: "신사업 기획 단계부터 필요한 인력과 조직 구조를 세팅하는 제안", type: "HRBP" }, { text: "포괄임금제 등에 맞춰 기존의 평가 체계와 근로계약을 리뉴얼하는 제안", type: "ER_LR" }, { text: "핵심 가치를 구성원의 일상 행동 양식에 구조화하기 위한 캠페인 제안", type: "OD" } ] },
        { q: "Q6. HR 실무자로서 가장 큰 성취감을 느낄 것 같은 순간은?", options: [ { text: "전사 조직 건강도 및 몰입도 서베이 결과가 작년 대비 월등히 개선되었을 때", type: "OD" }, { text: "담당 조직의 성과가 오르며, 파트너로서 비즈니스 성공을 견인했을 때", type: "HRBP" }, { text: "단체교섭이나 갈등 상황에서 경영 목표에 맞게 안정적인 합의를 이끌어냈을 때", type: "ER_LR" } ] },
        { q: "Q7. HR 데이터를 다룬다면 어떤 목적과 방식이 가장 편안한가?", options: [ { text: "급여, 시장 데이터를 해석하여 인센티브 재원을 정확히 산정하기 위해", type: "Comp" }, { text: "정성적 분위기를 eNPS, 이탈률 등 정량적 데이터와 결합해 시각화하기 위해", type: "OD" }, { text: "교육 만족도 등 교육 효과성 데이터를 통계적으로 검증하고 개선하기 위해", type: "HRD" } ] },
        { q: "Q8. 업무 중 예기치 못한 돌발 상황이 발생했을 때, 당신의 대응은?", options: [ { text: "면접관 불참 등 프로세스 이슈에 유연하고 빠르게 플랜 B로 대처한다.", type: "TA" }, { text: "예외적인 세무/법적 이슈 발생 시 규정과 기준에 근거해 논리적으로 대응한다.", type: "Comp" }, { text: "급변하는 사업 환경에 맞춰 조직과 일하는 방식을 민첩하게 재설계한다.", type: "HRBP" } ] },
        { q: "Q9. 직무 전문가로 성장하기 위해 가장 강력하게 키우고 싶은 무기는?", options: [ { text: "타인의 마음을 열고 민감한 정보를 매끄럽게 다루는 커뮤니케이션 능력", type: "TA" }, { text: "데이터를 기반으로 맥락을 이해하고 리더들을 논리적으로 설득하는 능력", type: "HRBP" }, { text: "노동법 등 인사제도 전반의 뼈대가 되는 제도적 지식과 컴플라이언스 역량", type: "ER_LR" } ] },
        { q: "Q10. 팀 프로젝트를 할 때, 당신이 가장 선호하는 역할은?", options: [ { text: "예산을 꼼꼼하게 관리하고 비용을 오류 없이 산정하여 정산하는 총무 역할", type: "Comp" }, { text: "그라운드 룰을 세팅하고 긍정적인 분위기를 디자인하는 역할", type: "OD" }, { text: "프로젝트에 필요한 사람을 적극적으로 섭외하고 영입해 오는 마케터 역할", type: "TA" } ] },
        { q: "Q11. 시간 날 때 챙겨보고 싶은 아티클이나 스터디 주제는?", options: [ { text: "대기업 통상임금 판례 및 공정인사 지침의 법적 정합성 분석", type: "ER_LR" }, { text: "최신 IT 기술 트렌드와 리딩 기업의 사내 학습 공동체 구축 사례", type: "HRD" }, { text: "고연봉 정책 등 성과 중심의 유연한 보상 문화와 시장 데이터 분석", type: "Comp" } ] },
        { q: "Q12. 당신이 생각하는 HR의 궁극적인 목적은 무엇인가?", options: [ { text: "채용부터 퇴직까지 HR 전체 사이클을 총괄하는 비즈니스의 전략적 파트너", type: "HRBP" }, { text: "조직 변화의 저항을 줄이고 몰입을 돕는 유연한 문화를 정착시키는 것", type: "OD" }, { text: "요구 분석을 통해 구성원 개개인이 직무 역량을 최고치로 발휘하도록 돕는 것", type: "HRD" } ] }
    ];

    const resultsData = {
        "TA": {
            title: "채용 (TA)", emoji: "🎯",
            desc: "사업과 조직 운영에 필요한 핵심 인재를 발굴하고 체계적으로 이끄는 마케터입니다.<span class='hidden-cite'>[cite: 1]</span>",
            action: "✅ <b>스펙:</b> 퍼포먼스 마케팅 기초, 링크드인 활용<br>✅ <b>경험:</b> 커피챗 제안, 학회 리크루팅 기획",
            chemGood: { name: "HRBP", reason: "신사업 판을 짜면 인재를 쏙쏙 데려오는 완벽한 공격수 조합!<span class='hidden-cite'>[cite: 1, 3]</span>" },
            chemBad: { name: "보상(Comp)", reason: "A급 인재 연봉 인상(채용) vs 정해진 예산과 기준 사수(보상)의 창과 방패<span class='hidden-cite'>[cite: 1]</span>" }
        },
        "Comp": {
            title: "보상 (Compensation)", emoji: "💰",
            desc: "급여 및 세무 기준에 맞춰 정확한 보상을 산정하는 정교한 제도 설계자입니다.<span class='hidden-cite'>[cite: 1]</span>",
            action: "✅ <b>스펙:</b> 컴활 1급, 엑셀 고급 수식 마스터<br>✅ <b>경험:</b> 회비 예산안 기획/정산, 연봉 구조 스터디",
            chemGood: { name: "인사노무(ER)", reason: "감정보다 팩트와 데이터를 중시하여 말이 제일 잘 통함!<span class='hidden-cite'>[cite: 1, 2]</span>" },
            chemBad: { name: "채용(TA)", reason: "예산을 방어하려는 보상팀과 연봉을 얹어주려는 채용팀의 대립<span class='hidden-cite'>[cite: 1]</span>" }
        },
        "ER_LR": {
            title: "인사노무 (ER/LR)", emoji: "⚖️",
            desc: "노동법 기반으로 절차를 준수하며 조직 갈등을 중재하는 든든한 원칙주의자입니다.<span class='hidden-cite'>[cite: 2]</span>",
            action: "✅ <b>스펙:</b> 공인노무사 1차(노동법), ERP 인사<br>✅ <b>경험:</b> 갈등 중재, 공정인사 지침 분석 스터디",
            chemGood: { name: "보상(Comp)", reason: "법적 기준과 절차를 가장 중요하게 생각하는 완벽한 실무 콤비!<span class='hidden-cite'>[cite: 1, 2]</span>" },
            chemBad: { name: "조직문화(OD)", reason: "엄격한 규정과 통제(노무) vs 자율적이고 유연한 넷플릭스식 문화(조직문화)<span class='hidden-cite'>[cite: 2, 4]</span>" }
        },
        "HRBP": {
            title: "HRBP", emoji: "♟️",
            desc: "사업 이해를 바탕으로 리더십 그룹과 전략을 수립해 비즈니스를 견인하는 파트너입니다.<span class='hidden-cite'>[cite: 3]</span>",
            action: "✅ <b>스펙:</b> SQL 등 HR 데이터 분석, 퍼실리테이션<br>✅ <b>경험:</b> 조직 문제점 진단 및 팀 R&R 정밀 설계",
            chemGood: { name: "채용(TA)", reason: "비즈니스를 위해 조직을 세팅하면 즉각 인재를 수혈하는 티키타카!<span class='hidden-cite'>[cite: 1, 3]</span>" },
            chemBad: { name: "교육(HRD)", reason: "당장 이번 분기의 빠른 성과(HRBP) vs 중장기적인 역량 육성(교육)<span class='hidden-cite'>[cite: 3, 4]</span>" }
        },
        "HRD": {
            title: "교육 (HRD)", emoji: "🌱",
            desc: "커리큘럼을 설계하고 자율적인 지식 공유 환경을 기획하여 성장을 돕는 페이스메이커입니다.<span class='hidden-cite'>[cite: 4]</span>",
            action: "✅ <b>스펙:</b> 노션 지식 관리 시스템 구축, PPT 시각화<br>✅ <b>경험:</b> 세미나 커리큘럼 기획 및 사내 강사 발표",
            chemGood: { name: "조직문화(OD)", reason: "사람의 긍정적인 경험과 성장을 중시하여 기획 회의할 때 쿵짝이 맞음!<span class='hidden-cite'>[cite: 4]</span>" },
            chemBad: { name: "HRBP", reason: "중장기적 관점의 역량 육성(교육) vs 당장의 민첩한 사업 성과(HRBP)<span class='hidden-cite'>[cite: 3, 4]</span>" }
        },
        "OD": {
            title: "조직문화 (OD)", emoji: "🎨",
            desc: "핵심 가치를 전파하고 긍정적인 직원 경험(EX)을 디자인하는 매력적인 컬처 빌더입니다.<span class='hidden-cite'>[cite: 4]</span>",
            action: "✅ <b>스펙:</b> 사조사 2급, 사내 커뮤니케이션 기획<br>✅ <b>경험:</b> 몰입도 서베이 분석, 그라운드 룰 제정",
            chemGood: { name: "교육(HRD)", reason: "직원들에 대한 애정을 바탕으로 시너지를 내는 최고의 기획 파트너!<span class='hidden-cite'>[cite: 4]</span>" },
            chemBad: { name: "인사노무(ER)", reason: "자율적이고 유연한 문화 지향(조직문화) vs 리스크 방지를 위한 통제(노무)<span class='hidden-cite'>[cite: 2, 4]</span>" }
        }
    };

    let currentQuestionIndex = 0;
    let scores = { TA: 0, Comp: 0, ER_LR: 0, HRBP: 0, HRD: 0, OD: 0 };
    let historyStack = []; 

    function startTest() {
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('question-screen').style.display = 'block';
        showQuestion();
    }

    function showQuestion() {
        if (currentQuestionIndex >= questions.length) {
            processResult();
            return;
        }

        const qText = document.getElementById('question-text');
        const oContainer = document.getElementById('options-container');
        
        qText.classList.remove('fade-in'); oContainer.classList.remove('fade-in');
        void qText.offsetWidth; 
        qText.classList.add('fade-in'); oContainer.classList.add('fade-in');

        const q = questions[currentQuestionIndex];
        qText.innerText = q.q;
        oContainer.innerHTML = ''; 

        q.options.forEach(option => {
            const btn = document.createElement('button');
            btn.className = 'btn option-btn';
            btn.innerText = option.text;
            btn.onclick = () => selectOption(option.type);
            oContainer.appendChild(btn);
        });

        const currentNum = currentQuestionIndex + 1;
        const totalNum = questions.length;
        document.getElementById('progress-text').innerText = `${currentNum} / ${totalNum}`;
        document.getElementById('progress').style.width = ((currentNum / totalNum) * 100) + '%';
    }

    function selectOption(type) {
        scores[type]++;
        historyStack.push(type);
        currentQuestionIndex++;
        showQuestion();
    }

    function goBack() {
        if (currentQuestionIndex > 0) {
            currentQuestionIndex--;
            const lastType = historyStack.pop();
            scores[lastType]--; 
            showQuestion();
        } else {
            alert("첫 번째 질문입니다.");
        }
    }

    function processResult() {
        document.getElementById('question-screen').style.display = 'none';
        document.getElementById('loading-screen').style.display = 'block';

        setTimeout(() => {
            document.getElementById('loading-screen').style.display = 'none';
            document.getElementById('result-screen').style.display = 'block';
            renderResult();
        }, 1500);
    }

    function renderResult() {
        let topJob = Object.keys(scores).reduce((a, b) => scores[a] >= scores[b] ? a : b);
        const res = resultsData[topJob];

        document.getElementById('result-title').innerHTML = `${res.emoji} ${res.title}`;
        document.getElementById('result-desc').innerHTML = `<strong>${res.title} 포지션은?</strong><br>${res.desc}`;
        
        document.getElementById('chemistry-container').innerHTML = `
            <div class="chem-box chem-good">
                <div class="chem-header">
                    <span class="chem-title">😍 환상의 짝꿍</span>
                    <span class="chem-name">${res.chemGood.name}</span>
                </div>
                <div class="chem-reason">${res.chemGood.reason}</div>
            </div>
            <div class="chem-box chem-bad">
                <div class="chem-header">
                    <span class="chem-title">😱 파국인 짝꿍</span>
                    <span class="chem-name">${res.chemBad.name}</span>
                </div>
                <div class="chem-reason">${res.chemBad.reason}</div>
            </div>
        `;

        document.getElementById('action-plan').innerHTML = `<strong>💡 커리어 액션 플랜</strong>${res.action}`;

        const statsContainer = document.getElementById('stats-container');
        statsContainer.innerHTML = '';
        const sortedScores = Object.entries(scores).sort((a, b) => b[1] - a[1]);
        
        sortedScores.forEach(([key, score]) => {
            const percent = (score / 6) * 100;
            const title = resultsData[key].title;
            const statHtml = `
                <div class="stat-item">
                    <div style="display:flex; justify-content:space-between; margin-bottom: 4px;">
                        <span>${title}</span>
                        <span style="color:var(--text-muted); font-size:0.75rem;">${Math.round(percent)}%</span>
                    </div>
                    <div class="stat-bar-bg">
                        <div class="stat-bar-fill" style="width: ${percent}%;"></div>
                    </div>
                </div>
            `;
            statsContainer.innerHTML += statHtml;
        });
    }
</script>

</body>
</html>
